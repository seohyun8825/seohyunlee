<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-labelledby="title desc">
  <title id="title">MoE-GRPO paper thumbnail</title>
  <desc id="desc">A stylized mixture-of-experts routing diagram for the MoE-GRPO publication.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="600" height="400" rx="32" fill="url(#bg)"/>
  <circle cx="128" cy="108" r="48" fill="#60a5fa" opacity=".2" filter="url(#soft)"/>
  <circle cx="470" cy="290" r="68" fill="#22c55e" opacity=".16" filter="url(#soft)"/>
  <g fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round">
    <path d="M126 202C196 120 292 110 372 168"/>
    <path d="M126 202C230 206 306 232 420 300"/>
    <path d="M126 202C218 286 312 310 448 226"/>
  </g>
  <g fill="#0f172a" stroke="#93c5fd" stroke-width="4">
    <circle cx="126" cy="202" r="44"/>
    <circle cx="384" cy="170" r="38"/>
    <circle cx="420" cy="300" r="38"/>
    <circle cx="448" cy="226" r="38"/>
  </g>
  <g fill="#e5f2ff" font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <text x="126" y="197" font-size="20" font-weight="700">VLM</text>
    <text x="126" y="222" font-size="14">router</text>
    <text x="384" y="178" font-size="24" font-weight="700">E1</text>
    <text x="420" y="308" font-size="24" font-weight="700">E2</text>
    <text x="448" y="234" font-size="24" font-weight="700">E3</text>
  </g>
  <text x="300" y="62" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" text-anchor="middle">MoE-GRPO</text>
  <text x="300" y="346" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" text-anchor="middle">CVPR 2026</text>
</svg>
